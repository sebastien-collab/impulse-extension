<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impulsion</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="impulsion-app">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="logo">
          <svg width="16" height="18" viewBox="0 0 433.03 500" fill="currentColor">
            <polygon points="52.11 94.91 0 124.99 0 185.16 164.4 280.08 164.4 469.92 216.51 500 268.61 469.92 268.61 219.93 52.11 94.91"/>
            <polygon points="216.51 0 122.82 54.08 339.35 179.07 339.35 429.09 433.03 375.01 433.03 124.99 216.51 0"/>
            <polygon points="0 266.84 .02 375.01 93.68 429.09 93.68 320.93 0 266.84"/>
          </svg>
        </span>
        <h1 class="title">Impulsion</h1>
      </div>
      <div class="header-right">
        <span class="pixel-count" id="pixelCount">0</span>
        <span class="pixel-label">pixels</span>
      </div>
    </header>

    <!-- Platform summary badges -->
    <div class="summary-bar" id="summaryBar"></div>

    <!-- Consent Mode V2 section -->
    <div class="consent-section hidden" id="consentSection">
      <div class="consent-header" id="consentHeader">
        <div class="consent-header-left">
          <span class="consent-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </span>
          <span class="consent-title">Consent Mode V2</span>
          <span class="consent-mode-badge" id="consentModeBadge"></span>
        </div>
        <div class="consent-header-right">
          <span class="consent-issue-count" id="consentIssueCount"></span>
          <span class="consent-chevron" id="consentChevron">&#9654;</span>
        </div>
      </div>
      <div class="consent-detail hidden" id="consentDetail">
        <div class="consent-params" id="consentParams"></div>
        <div class="consent-issues" id="consentIssues"></div>
        <div class="consent-timeline" id="consentTimeline"></div>
      </div>
    </div>

    <!-- Pixel list -->
    <div class="pixel-list" id="pixelList">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10" opacity="0.3"/>
            <circle cx="12" cy="12" r="6" opacity="0.5"/>
            <circle cx="12" cy="12" r="2"/>
            <line x1="12" y1="2" x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="5" y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
          </svg>
        </div>
        <p class="empty-text">No pixels detected</p>
        <p class="empty-hint">Navigate to a page with tracking pixels</p>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span class="footer-text">Impulsion v1.0 — Universal Pixel Debugger</span>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
